name: Publish Extension

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整历史，用于检查 Tag 和生成日志

      # 设定一个变量来决定是否发布，并提取当前版本号
      - name: Prepare publish info
        id: prep
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 检查当前版本号是否已经有对应的 Git Tag
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists."
            TAG_EXISTS=true
          else
            echo "Tag v$VERSION does not exist."
            TAG_EXISTS=false
          fi

          # 逻辑：如果是手动触发 OR 标签不存在 (说明是新版本)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "$TAG_EXISTS" == "false" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Install pnpm
        if: steps.prep.outputs.publish == 'true'
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        if: steps.prep.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.prep.outputs.publish == 'true'
        run: pnpm install

      - name: Generate Changelog
        if: steps.prep.outputs.publish == 'true'
        id: changelog
        run: |
          # 使用 conventional-changelog 生成当前版本的增量日志
          pnpm exec conventional-changelog -p angular -r 1 > LATEST_CHANGELOG.md
          # 输出到 GitHub Step Output
          {
            echo 'body<<EOF'
            cat LATEST_CHANGELOG.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compile and Package
        if: steps.prep.outputs.publish == 'true'
        run: |
          pnpm run compile
          npx vsce package -o extension.vsix

      - name: Create Release
        if: steps.prep.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: extension.vsix
          tag_name: v${{ steps.prep.outputs.version }}
          name: v${{ steps.prep.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Marketplace
        if: steps.prep.outputs.publish == 'true'
        run: npx vsce publish --packagePath extension.vsix -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.prep.outputs.publish == 'true'
        run: pnpm exec ovsx publish extension.vsix -p ${{ secrets.OVSX_PAT }}
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
